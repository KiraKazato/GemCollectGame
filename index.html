<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宝石集め脱出ゲーム</title>
    <style>
        body {
            background-color: #333;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        #gameCanvas {
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            cursor: pointer; 
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1>宝石集め脱出ゲーム</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let currentScene = 'TITLE';
        let resultMessage = '';

        // 【追加】ランキング用変数
        let startTime = 0;
        let clearTime = 0;
        let leaderboard = JSON.parse(localStorage.getItem('gemEscapeLeaderboard')) || []; 

        // 【変更】WASDとQキーの入力サポートを追加
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, s: false, d: false, q: false
        };

        const tileSize = 50; 
        let map = [];
        
        function generateMap(width, height) {
            let newMap = [];
            // 1. 全て壁(1)
            for (let y = 0; y < height; y++) {
                let row = [];
                for (let x = 0; x < width; x++) {
                    row.push(1);
                }
                newMap.push(row);
            }

            // 2. 7x5のセル(マクログリッド)で迷路を生成
            const COLS = 7;
            const ROWS = 5;
            let maze = [];
            for (let cy = 0; cy < ROWS; cy++) {
                let row = [];
                for (let cx = 0; cx < COLS; cx++) {
                    row.push({
                        visited: false,
                        top: false, bottom: false, left: false, right: false,
                        isRoom: false
                    });
                }
                maze.push(row);
            }

            // プリム法（Prim's Algorithm）で遠回りの少ない放射状の迷路を作成
            let stack = [[0, 0]];
            maze[0][0].visited = true;

            while (stack.length > 0) {
                // スタックからランダムに選ぶことでクネクネした道を減らし、直進や短い分岐を増やす
                let randIndex = Math.floor(Math.random() * stack.length);
                let current = stack[randIndex];
                let cx = current[0];
                let cy = current[1];
                
                let neighbors = [];
                if (cy > 0 && !maze[cy - 1][cx].visited) neighbors.push({x: cx, y: cy - 1, dir: 'top'});
                if (cy < ROWS - 1 && !maze[cy + 1][cx].visited) neighbors.push({x: cx, y: cy + 1, dir: 'bottom'});
                if (cx > 0 && !maze[cy][cx - 1].visited) neighbors.push({x: cx - 1, y: cy, dir: 'left'});
                if (cx < COLS - 1 && !maze[cy][cx + 1].visited) neighbors.push({x: cx + 1, y: cy, dir: 'right'});
                
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[next.y][next.x].visited = true;
                    if (next.dir === 'top') { maze[cy][cx].top = true; maze[next.y][next.x].bottom = true; }
                    if (next.dir === 'bottom') { maze[cy][cx].bottom = true; maze[next.y][next.x].top = true; }
                    if (next.dir === 'left') { maze[cy][cx].left = true; maze[next.y][next.x].right = true; }
                    if (next.dir === 'right') { maze[cy][cx].right = true; maze[next.y][next.x].left = true; }
                    stack.push([next.x, next.y]);
                } else {
                    stack.splice(randIndex, 1);
                }
            }

            // 3. 遠回りを防ぐため、残っている「塞がった壁」を約80%の確率で全て開通させる（道を極限まで繋げる）
            for (let cy = 0; cy < ROWS; cy++) {
                for (let cx = 0; cx < COLS; cx++) {
                    // 上の壁が閉じていたら、80%の確率で開ける
                    if (cy > 0 && !maze[cy][cx].top && Math.random() < 0.8) {
                        maze[cy][cx].top = true; 
                        maze[cy - 1][cx].bottom = true;
                    }
                    // 左の壁が閉じていたら、80%の確率で開ける
                    if (cx > 0 && !maze[cy][cx].left && Math.random() < 0.8) {
                        maze[cy][cx].left = true; 
                        maze[cy][cx - 1].right = true;
                    }
                }
            }

            // 3.5 行き止まりの完全撤廃（全てのセルが2つ以上の道を持つように強制する）
            let hasDeadEnd = true;
            let safetyCount = 0;
            while (hasDeadEnd && safetyCount < 1000) {
                hasDeadEnd = false;
                safetyCount++;
                for (let cy = 0; cy < ROWS; cy++) {
                    for (let cx = 0; cx < COLS; cx++) {
                        let connections = 0;
                        if (maze[cy][cx].top) connections++;
                        if (maze[cy][cx].bottom) connections++;
                        if (maze[cy][cx].left) connections++;
                        if (maze[cy][cx].right) connections++;
                        
                        if (connections === 1) {
                            hasDeadEnd = true;
                            // 閉じている壁をランダムに1つ開ける
                            let dirs = [];
                            if (cy > 0 && !maze[cy][cx].top) dirs.push('top');
                            if (cy < ROWS - 1 && !maze[cy][cx].bottom) dirs.push('bottom');
                            if (cx > 0 && !maze[cy][cx].left) dirs.push('left');
                            if (cx < COLS - 1 && !maze[cy][cx].right) dirs.push('right');
                            
                            if (dirs.length > 0) {
                                let dir = dirs[Math.floor(Math.random() * dirs.length)];
                                if (dir === 'top') { maze[cy][cx].top = true; maze[cy - 1][cx].bottom = true; }
                                if (dir === 'bottom') { maze[cy][cx].bottom = true; maze[cy + 1][cx].top = true; }
                                if (dir === 'left') { maze[cy][cx].left = true; maze[cy][cx - 1].right = true; }
                                if (dir === 'right') { maze[cy][cx].right = true; maze[cy][cx + 1].left = true; }
                            }
                        }
                    }
                }
            }

            // 4. ランダムなセルを5つ選んで「3x3の部屋」にする
            // スタート(0,0)とゴール(6,4)は最初から確定で部屋にする
            maze[0][0].isRoom = true;
            maze[ROWS - 1][COLS - 1].isRoom = true;

            let roomCandidates = [];
            for (let cy = 0; cy < ROWS; cy++) {
                for (let cx = 0; cx < COLS; cx++) {
                    if ((cx === 0 && cy === 0) || (cx === COLS - 1 && cy === ROWS - 1)) continue;
                    roomCandidates.push([cx, cy]);
                }
            }
            roomCandidates.sort(() => Math.random() - 0.5);
            // 確定の2部屋以外に、ランダムで3部屋追加する
            for (let i = 0; i < 3; i++) {
                let [rx, ry] = roomCandidates[i];
                maze[ry][rx].isRoom = true;
            }

            // 5. 実際の31x21マップに描画する
            for (let cy = 0; cy < ROWS; cy++) {
                for (let cx = 0; cx < COLS; cx++) {
                    let cell = maze[cy][cx];
                    // 各セルの左上の座標を計算
                    let startX = cx * 4 + 1;
                    let startY = cy * 4 + 1;
                    
                    if (cell.isRoom) {
                        // 部屋の場合は3x3を完全に空洞にする
                        for (let dy = 0; dy < 3; dy++) {
                            for (let dx = 0; dx < 3; dx++) {
                                newMap[startY + dy][startX + dx] = 0;
                            }
                        }
                    } else {
                        // 通路の場合は十字路のセンターのみ空ける
                        newMap[startY + 1][startX + 1] = 0;
                        // 各方向への道を開通
                        if (cell.top) newMap[startY][startX + 1] = 0;
                        if (cell.bottom) newMap[startY + 2][startX + 1] = 0;
                        if (cell.left) newMap[startY + 1][startX] = 0;
                        if (cell.right) newMap[startY + 1][startX + 2] = 0;
                    }
                    
                    // セルとセルの「間の壁」を開通させる
                    if (cell.right && cx < COLS - 1) {
                        newMap[startY + 1][startX + 3] = 0;
                    }
                    if (cell.bottom && cy < ROWS - 1) {
                        newMap[startY + 3][startX + 1] = 0;
                    }
                }
            }

            // 6. ステルス草むら(3)の生成
            let bushes = 0;
            for (let cy = 0; cy < ROWS; cy++) {
                for (let cx = 0; cx < COLS; cx++) {
                    if (maze[cy][cx].isRoom) {
                        // スタート(0,0)とゴール(COLS-1,ROWS-1)には草を置かない
                        if (cy === 0 && cx === 0) continue;
                        if (cy === ROWS - 1 && cx === COLS - 1) continue;

                        let startX = cx * 4 + 1;
                        let startY = cy * 4 + 1;
                        
                        // 部屋の四隅（道を塞がない位置）に1x1の草むらを配置する
                        let corners = [
                            [0, 0], [2, 0],
                            [0, 2], [2, 2]
                        ];
                        // ランダムな隅を1〜3箇所選んで草を置く
                        corners.sort(() => Math.random() - 0.5);
                        let numBushes = Math.floor(Math.random() * 3) + 1; // 1〜3個
                        for (let i = 0; i < numBushes; i++) {
                            let c = corners[i];
                            newMap[startY + c[1]][startX + c[0]] = 3;
                            bushes++;
                        }
                    }
                }
            }

            // 7. ゴール(2)
            // 最後のセル(6, 4)の中心に配置
            let goalX = (COLS - 1) * 4 + 2;
            let goalY = (ROWS - 1) * 4 + 2;
            newMap[goalY][goalX] = 2;

            return newMap;
        }

        const player = {
            x: 107, 
            y: 107, 
            size: 36, // プレイヤーを少し大きく表示する
            speed: 3,
            dirX: 1, // 初期状態は右向き
            dirY: 0,
            // 【追加】スキル関連のプロパティ【追加】スキル関連と状態変数
            skillCooldownMax: 60 * 45, // 【変更】クールタイムを45秒に延長
            skillCooldown: 0,
            magnetActiveFrames: 0,
            isInBush: false
        };

        let gems = [];
        let score = 0;
        let goal = { x: 0, y: 0 };
        let enemies = [];
        let totalGemsCount = 0;
        let collectedGemsCount = 0;

        function spawnEnemy() {
            let validSpots = [];
            for (let y = 1; y < map.length - 1; y++) {
                for (let x = 1; x < map[0].length - 1; x++) {
                    if (map[y][x] === 0) { // 【変更】敵も草むらには出現しない
                        let px = player.x / tileSize;
                        let py = player.y / tileSize;
                        let dist = Math.abs(x - px) + Math.abs(y - py);
                        if (dist > 8) validSpots.push({x, y});
                    }
                }
            }
            if (validSpots.length > 0) {
                let spot = validSpots[Math.floor(Math.random() * validSpots.length)];
                enemies.push({
                    x: spot.x * tileSize + tileSize / 2, 
                    y: spot.y * tileSize + tileSize / 2, 
                    size: 36,         // 【変更】敵を大きくした
                    patrolSpeed: 1.0, 
                    chaseSpeed: 2.8,  
                    state: 'patrol',  
                    chaseTimer: 0,    // 【追加】見失ってから追いかける時間
                    dirX: 0,
                    dirY: 0,
                    patrolTimer: 0    
                });
            }
        }

        function initGame() {
            map = generateMap(31, 21);

            player.x = tileSize * 1 + (tileSize - player.size) / 2; 
            player.y = tileSize * 1 + (tileSize - player.size) / 2; 
            player.skillCooldown = 0;
            player.magnetActiveFrames = 0;
            player.isInBush = false;

            score = 0;
            gems = [];
            
            // 【追加】タイマー開始
            startTime = Date.now();
            clearTime = 0;
            enemies = [];
            collectedGemsCount = 0;

            let validGemSpots = [];
            for (let y = 1; y < map.length - 1; y++) {
                for (let x = 1; x < map[0].length - 1; x++) {
                    if (map[y][x] === 0) {
                        if (x === 1 && y === 1) continue;
                        validGemSpots.push({x, y});
                    } else if (map[y][x] === 2) {
                        goal.x = x * tileSize + tileSize / 2;
                        goal.y = y * tileSize + tileSize / 2;
                    }
                }
            }

            // 通路には1マスに1つずつ、すべての場所に宝石を配置する（パックマン方式）
            for (let i = 0; i < validGemSpots.length; i++) {
                let spot = validGemSpots[i];
                gems.push({
                    x: spot.x * tileSize + tileSize / 2, 
                    y: spot.y * tileSize + tileSize / 2, 
                    radius: 4,                      
                    collected: false,
                    beingPulled: false 
                });
            }
            totalGemsCount = gems.length;
            spawnEnemy();
        }

        // ------------------------------------------
        // 入力処理 (WASD対応)
        // ------------------------------------------
        
        // クリックでのスタート処理を削除し、下のkeydownイベント内でEnterキー判定を行うように変更

        document.addEventListener('keydown', function(event) {
            let k = event.key;
            
            // 【変更】エンターキーでゲームスタート / タイトルへ戻る
            if (k === 'Enter') {
                if (currentScene === 'TITLE') {
                    initGame();
                    currentScene = 'GAME';
                } else if (currentScene === 'RESULT') {
                    currentScene = 'TITLE';
                }
            }

            if (k.length === 1) k = k.toLowerCase();
            if (keys.hasOwnProperty(k)) {
                keys[k] = true;
                if (k.startsWith('Arrow')) event.preventDefault();
            }
        });

        document.addEventListener('keyup', function(event) {
            let k = event.key;
            if (k.length === 1) k = k.toLowerCase();
            if (keys.hasOwnProperty(k)) {
                keys[k] = false;
            }
        });

        function isWall(x, y) {
            const mapWidth = map[0].length * tileSize;
            const mapHeight = map.length * tileSize;
            if (x < 0 || x >= mapWidth || y < 0 || y >= mapHeight) {
                return true; 
            }
            let mapX = Math.floor(x / tileSize);
            let mapY = Math.floor(y / tileSize);
            if (mapY >= 0 && mapY < map.length && mapX >= 0 && mapX < map[0].length) {
                return map[mapY][mapX] === 1; // 1(壁)以外は通れる
            }
            return true;
        }

        // 敵用の壁判定（草むらも壁）
        function isEnemyWall(ex, ey) {
            let tx = Math.floor(ex / tileSize);
            let ty = Math.floor(ey / tileSize);
            if (tx < 0 || tx >= map[0].length || ty < 0 || ty >= map.length) return true;
            return map[ty][tx] === 1 || map[ty][tx] === 3; // 【変更】敵にとっては草むら(3)も壁として扱う
        }

        // ------------------------------------------
        // 距離マップ計算
        // ------------------------------------------

        let distanceMap = [];
        function updateDistanceMap() {
            let px = Math.floor((player.x + player.size / 2) / tileSize);
            let py = Math.floor((player.y + player.size / 2) / tileSize);

            distanceMap = Array(map.length).fill(0).map(() => Array(map[0].length).fill(9999));
            if (px < 0 || px >= map[0].length || py < 0 || py >= map.length) return;
            
            // プレイヤーが草むらの中にいる場合、敵はルートを見つけられないため距離計算をスキップする
            if (map[py][px] === 3) return;

            let queue = [[px, py]];
            distanceMap[py][px] = 0;
            const dirs = [[0,-1], [0,1], [-1,0], [1,0]];

            while(queue.length > 0) {
                let [cx, cy] = queue.shift();
                let currentDist = distanceMap[cy][cx];

                for (let [dx, dy] of dirs) {
                    let nx = cx + dx;
                    let ny = cy + dy;
                    if (nx >= 0 && nx < map[0].length && ny >= 0 && ny < map.length) {
                        // 【変更】敵は草むら(3)を壁と同じように避けてルートを探す
                        if (map[ny][nx] !== 1 && map[ny][nx] !== 3 && distanceMap[ny][nx] === 9999) {
                            distanceMap[ny][nx] = currentDist + 1; 
                            queue.push([nx, ny]);                  
                        }
                    }
                }
            }
        }
        
        // ------------------------------------------
        // 更新処理
        // ------------------------------------------
        
        function update(timeScale = 1) {
            if (currentScene === 'GAME') {
                
                // 【追加】スキル発動 (Qキー)
                if (keys.q && player.skillCooldown <= 0) {
                    player.magnetActiveFrames = 60 * 10; // 10秒間
                    player.skillCooldown = player.skillCooldownMax;
                }

                if (player.magnetActiveFrames > 0) {
                    player.magnetActiveFrames -= timeScale;
                } else {
                    // 【変更】スキルが終わってからクールダウンが減るようにする
                    if (player.skillCooldown > 0) player.skillCooldown -= timeScale;
                }

                let playerCenterX = player.x + player.size / 2;
                let playerCenterY = player.y + player.size / 2;
                let ptx = Math.floor(playerCenterX / tileSize);
                let pty = Math.floor(playerCenterY / tileSize);

                // 【追加】草むらの中での効果
                if (map[pty] && map[pty][ptx] === 3) {
                    player.isInBush = true;
                    player.speed = 1.5; // 草むらでは足が遅くなる
                } else {
                    player.isInBush = false;
                    player.speed = 3.0;
                }

                // 移動の入力（WASD追加）
                let moveUp = keys.ArrowUp || keys.w;
                let moveDown = keys.ArrowDown || keys.s;
                let moveLeft = keys.ArrowLeft || keys.a;
                let moveRight = keys.ArrowRight || keys.d;

                if (moveUp || moveDown || moveLeft || moveRight) {
                    player.dirX = (moveRight ? 1 : 0) - (moveLeft ? 1 : 0);
                    player.dirY = (moveDown ? 1 : 0) - (moveUp ? 1 : 0);
                    
                    // 斜め移動の場合は正規化に近い形で見た目の向きを整える（単純化）
                    if (player.dirX !== 0 && player.dirY !== 0) {
                        player.dirX *= 0.7;
                        player.dirY *= 0.7;
                    }
                }

                let nextX = player.x;
                let nextY = player.y;

                if (moveUp)    nextY -= player.speed * timeScale;
                if (moveDown)  nextY += player.speed * timeScale;
                if (moveLeft)  nextX -= player.speed * timeScale;
                if (moveRight) nextX += player.speed * timeScale;

                const margin = 0.1; 
                if (!isWall(nextX + margin, player.y + margin) && 
                    !isWall(nextX + player.size - margin, player.y + margin) && 
                    !isWall(nextX + margin, player.y + player.size - margin) && 
                    !isWall(nextX + player.size - margin, player.y + player.size - margin)) {
                    player.x = nextX;
                }

                if (!isWall(player.x + margin, nextY + margin) && 
                    !isWall(player.x + player.size - margin, nextY + margin) && 
                    !isWall(player.x + margin, nextY + player.size - margin) && 
                    !isWall(player.x + player.size - margin, nextY + player.size - margin)) {
                    player.y = nextY;
                }

                playerCenterX = player.x + player.size / 2;
                playerCenterY = player.y + player.size / 2;

                // 宝石の判定と磁力効果
                let remainingGemsCount = 0;
                for (let i = 0; i < gems.length; i++) {
                    let gem = gems[i];
                    if (!gem.collected) {
                        let dx = playerCenterX - gem.x;
                        let dy = playerCenterY - gem.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);

                        if ((player.magnetActiveFrames > 0 && distance < 150) || gem.isFlying) {
                            gem.isFlying = true; 
                            gem.x += (dx / distance) * 5 * timeScale; 
                            gem.y += (dy / distance) * 5 * timeScale;
                            dx = playerCenterX - gem.x;
                            dy = playerCenterY - gem.y;
                            distance = Math.sqrt(dx * dx + dy * dy);
                        }

                        if (distance < (player.size / 2 + gem.radius)) {
                            gem.collected = true; 
                            score += 10;
                            collectedGemsCount++; 
                        } else {
                            remainingGemsCount++;
                        }
                    }
                }

                let progress = collectedGemsCount / totalGemsCount;
                if (progress >= 0.35 && enemies.length < 2) spawnEnemy(); 
                if (progress >= 0.70 && enemies.length < 3) spawnEnemy(); 

                updateDistanceMap();

                // 敵のAI
                for (let i = 0; i < enemies.length; i++) {
                    let enemy = enemies[i];
                    
                    let dx = playerCenterX - enemy.x;
                    let dy = playerCenterY - enemy.y;
                    let distToPlayer = Math.sqrt(dx * dx + dy * dy);

                    // 【変更】視界外になっても一定時間は追跡を続ける（草むらの場合は即座に見失う）
                    let canSeePlayer = distToPlayer < 220 && !player.isInBush;
                    
                    if (canSeePlayer) {
                        enemy.state = 'chase';
                        enemy.fleeTimer = 0;
                        enemy.chaseMemory = 180; // 3秒間は見えなくなっても追い続ける（記憶）
                    } else {
                        if (player.isInBush) {
                            enemy.chaseMemory = 0; // 草むらに入られたら即座に記憶リセット
                        }
                        
                        if (enemy.state === 'chase') {
                            if (enemy.chaseMemory > 0) {
                                enemy.chaseMemory -= timeScale;
                            } else {
                                // 記憶が切れたらパトロールに戻り、高速離脱する
                                enemy.state = 'patrol';
                                enemy.fleeTimer = 180;
                                enemy.patrolTimer = 0;
                            }
                        }
                    }

                    let nextEX = enemy.x;
                    let nextEY = enemy.y;

                    if (enemy.state === 'chase') {
                        let ex = Math.floor(enemy.x / tileSize);
                        let ey = Math.floor(enemy.y / tileSize);
                        let px = Math.floor(playerCenterX / tileSize);
                        let py = Math.floor(playerCenterY / tileSize);
                        
                        if (ex === px && ey === py) {
                            if (distToPlayer > 0) {
                                nextEX += (dx / distToPlayer) * enemy.chaseSpeed * timeScale;
                                nextEY += (dy / distToPlayer) * enemy.chaseSpeed * timeScale;
                            }
                        } else {
                            let bestDist = 9999;
                            let targetTileX = ex;
                            let targetTileY = ey;
                            
                            const dirs = [[0,-1], [0,1], [-1,0], [1,0]];
                            for (let [ddx, ddy] of dirs) {
                                let nx = ex + ddx;
                                let ny = ey + ddy;
                                if (nx >= 0 && nx < map[0].length && ny >= 0 && ny < map.length) {
                                    if (distanceMap[ny][nx] < bestDist) {
                                        bestDist = distanceMap[ny][nx];
                                        targetTileX = nx;
                                        targetTileY = ny;
                                    }
                                }
                            }

                            let targetX = targetTileX * tileSize + tileSize / 2;
                            let targetY = targetTileY * tileSize + tileSize / 2;
                            
                            // 【変更】角を曲がる際に壁にこすれて極端に減速する不具合を修正。
                            // 斜めベクトル計算をやめ、XとYをそれぞれ独立してフルスピードで動かす（プレイヤーのWASD移動と同じ仕組み）
                            let distX = targetX - enemy.x;
                            let distY = targetY - enemy.y;
                            
                            if (Math.abs(distX) > 0.1) {
                                nextEX += (distX > 0 ? 1 : -1) * Math.min(enemy.chaseSpeed * timeScale, Math.abs(distX));
                            }
                            if (Math.abs(distY) > 0.1) {
                                nextEY += (distY > 0 ? 1 : -1) * Math.min(enemy.chaseSpeed * timeScale, Math.abs(distY));
                            }
                        }
                    } else {
                        enemy.patrolTimer -= timeScale;
                        if (enemy.fleeTimer === undefined) enemy.fleeTimer = 0;
                        if (enemy.fleeTimer > 0) enemy.fleeTimer -= timeScale;

                        if (enemy.patrolTimer <= 0) {
                            // 上下左右の4方向にのみ移動する
                            const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
                            let r = Math.floor(Math.random() * 4);
                            enemy.dirX = dirs[r][0];
                            enemy.dirY = dirs[r][1];
                            enemy.patrolTimer = 60 + Math.random() * 60; 
                        }
                        // 高速離脱中は追跡時と同じスピードでスタスタと歩き去る
                        let currentSpeed = enemy.fleeTimer > 0 ? enemy.chaseSpeed : enemy.patrolSpeed;
                        nextEX += enemy.dirX * currentSpeed * timeScale;
                        nextEY += enemy.dirY * currentSpeed * timeScale;

                        // 【追加】広場から狭い通路に入る際、角に引っかかってUターンするのを防ぐため、自動でタイルの中心に寄る処理
                        if (enemy.dirX !== 0) {
                            let targetY = Math.floor(enemy.y / tileSize) * tileSize + tileSize / 2;
                            if (Math.abs(enemy.y - targetY) > 0.5) {
                                nextEY += (targetY > enemy.y ? 1 : -1) * Math.min(currentSpeed * timeScale, Math.abs(targetY - enemy.y));
                            }
                        }
                        if (enemy.dirY !== 0) {
                            let targetX = Math.floor(enemy.x / tileSize) * tileSize + tileSize / 2;
                            if (Math.abs(enemy.x - targetX) > 0.5) {
                                nextEX += (targetX > enemy.x ? 1 : -1) * Math.min(currentSpeed * timeScale, Math.abs(targetX - enemy.x));
                            }
                        }
                    }

                    const eMargin = 0.1;
                    let hitWallX = isEnemyWall(nextEX - enemy.size/2 + eMargin, enemy.y - enemy.size/2 + eMargin) ||
                                   isEnemyWall(nextEX + enemy.size/2 - eMargin, enemy.y - enemy.size/2 + eMargin) ||
                                   isEnemyWall(nextEX - enemy.size/2 + eMargin, enemy.y + enemy.size/2 - eMargin) ||
                                   isEnemyWall(nextEX + enemy.size/2 - eMargin, enemy.y + enemy.size/2 - eMargin);

                    let hitWallY = isEnemyWall(enemy.x - enemy.size/2 + eMargin, nextEY - enemy.size/2 + eMargin) ||
                                   isEnemyWall(enemy.x + enemy.size/2 - eMargin, nextEY - enemy.size/2 + eMargin) ||
                                   isEnemyWall(enemy.x - enemy.size/2 + eMargin, nextEY + enemy.size/2 - eMargin) ||
                                   isEnemyWall(enemy.x + enemy.size/2 - eMargin, nextEY + enemy.size/2 - eMargin);

                    if (!hitWallX) {
                        enemy.x = nextEX;
                    } else if (enemy.state === 'patrol' && enemy.dirX !== 0) {
                        enemy.patrolTimer = 0; // 進行方向（X軸）に壁があった場合のみ方向転換
                    }

                    if (!hitWallY) {
                        enemy.y = nextEY;
                    } else if (enemy.state === 'patrol' && enemy.dirY !== 0) {
                        enemy.patrolTimer = 0; // 進行方向（Y軸）に壁があった場合のみ方向転換
                    }

                    if (distToPlayer < (player.size / 2 + enemy.size / 2 - 2)) {
                        currentScene = 'RESULT';
                        resultMessage = 'ゲームオーバー...';
                    }
                }

                if (remainingGemsCount === 0) {
                    const dx = playerCenterX - goal.x;
                    const dy = playerCenterY - goal.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < (player.size / 2 + tileSize / 2)) {
                        // 【追加】タイムの記録とランキング更新
                        clearTime = Date.now() - startTime;
                        leaderboard.push(clearTime);
                        leaderboard.sort((a, b) => a - b);
                        if (leaderboard.length > 5) leaderboard.pop(); // 上位5位まで保持
                        localStorage.setItem('gemEscapeLeaderboard', JSON.stringify(leaderboard));

                        currentScene = 'RESULT';
                        resultMessage = 'ゲームクリア！！';
                    }
                }
            }
        }

        // ------------------------------------------
        // 描画処理
        // ------------------------------------------
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentScene === 'TITLE') {
                ctx.fillStyle = '#fff';
                ctx.font = '40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('宝石集め脱出ゲーム', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#aaa';
                ctx.font = '20px sans-serif';
                ctx.fillText('Enterキーを押してスタート', canvas.width / 2, canvas.height / 2 + 40);
                ctx.fillText('移動：矢印キー または W A S D', canvas.width / 2, canvas.height / 2 + 100);
                ctx.fillText('スキル：Q キー', canvas.width / 2, canvas.height / 2 + 130);
            
            } else if (currentScene === 'GAME') {
                // 【追加】最も近い追跡中の敵との距離を計算（焦り演出用）
                let minChaseDist = 9999;
                for (let enemy of enemies) {
                    if (enemy.state === 'chase') {
                        let dx = enemy.x - player.x;
                        let dy = enemy.y - player.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < minChaseDist) minChaseDist = dist;
                    }
                }
                
                let panicIntensity = 0;
                if (minChaseDist < 350) {
                    panicIntensity = Math.max(0, 1 - (minChaseDist / 350));
                }

                let cameraX = player.x + player.size / 2 - canvas.width / 2;
                let cameraY = player.y + player.size / 2 - canvas.height / 2;

                const maxCameraX = (map[0].length * tileSize) - canvas.width;
                const maxCameraY = (map.length * tileSize) - canvas.height;
                cameraX = Math.max(0, Math.min(cameraX, maxCameraX));
                cameraY = Math.max(0, Math.min(cameraY, maxCameraY));

                // 【追加】画面揺れ（スクリーンシェイク）エフェクト
                if (panicIntensity > 0) {
                    cameraX += (Math.random() - 0.5) * 12 * panicIntensity;
                    cameraY += (Math.random() - 0.5) * 12 * panicIntensity;
                }

                ctx.save();
                ctx.translate(-cameraX, -cameraY);

                const remainingGems = gems.filter(g => !g.collected).length;

                // --- マップの描画 ---
                for (let y = 0; y < map.length; y++) {
                    for (let x = 0; x < map[y].length; x++) {
                        if (map[y][x] === 1) {
                            ctx.fillStyle = '#225588';
                            ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                            ctx.strokeStyle = '#4488bb';
                            ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
                        } else if (map[y][x] === 2) {
                            ctx.fillStyle = (remainingGems === 0) ? '#00ff00' : '#444';
                            ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                            ctx.fillStyle = '#fff';
                            ctx.font = 'bold 12px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillText('EXIT', x * tileSize + tileSize / 2, y * tileSize + tileSize / 2 + 4);
                        } else if (map[y][x] === 3) {
                            // 草むら
                            ctx.fillStyle = '#1a3a1a'; 
                            ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                            ctx.fillStyle = '#225522';
                            ctx.fillRect(x * tileSize + 10, y * tileSize + 10, 10, 20);
                            ctx.fillRect(x * tileSize + 30, y * tileSize + 20, 10, 15);
                        } else {
                            ctx.fillStyle = '#1a1a1a';
                            ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                        }
                    }
                }

                // 宝石
                for (let i = 0; i < gems.length; i++) {
                    let gem = gems[i];
                    if (!gem.collected) {
                        ctx.fillStyle = '#00ffff'; 
                        ctx.beginPath();
                        ctx.arc(gem.x, gem.y, gem.radius, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                        ctx.beginPath();
                        ctx.arc(gem.x, gem.y, gem.radius + 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // 敵
                for (let i = 0; i < enemies.length; i++) {
                    let enemy = enemies[i];
                    ctx.fillStyle = (enemy.state === 'chase') ? '#ff3333' : '#aa3333';
                    ctx.fillRect(enemy.x - enemy.size / 2, enemy.y - enemy.size / 2, enemy.size, enemy.size);
                    
                    ctx.fillStyle = (enemy.state === 'chase') ? '#fff' : '#000';
                    ctx.fillRect(enemy.x - enemy.size / 4, enemy.y - enemy.size / 4 - 2, 4, 4);
                    ctx.fillRect(enemy.x + enemy.size / 4 - 4, enemy.y - enemy.size / 4 - 2, 4, 4);
                }

                // プレイヤー
                // 草むらにいる時は半透明に描画
                ctx.fillStyle = player.isInBush ? 'rgba(255, 204, 0, 0.5)' : '#ffcc00';
                ctx.fillRect(player.x, player.y, player.size, player.size);

                // プレイヤーの顔（目）を描画
                ctx.fillStyle = player.isInBush ? 'rgba(0, 0, 0, 0.5)' : '#333333';
                let eyeOffsetX = player.dirX * 6;
                let eyeOffsetY = player.dirY * 6;
                let eyeSize = 4;
                let eyeSpacing = 8;
                
                // 向きに応じて目の位置を計算
                let centerEyeX = player.x + player.size / 2 + eyeOffsetX;
                let centerEyeY = player.y + player.size / 2 + eyeOffsetY - 4; // 少し上の方に目を配置

                // 左目と右目を描画（横向きなら縦に並ぶなど、進行方向に直交するように配置）
                if (Math.abs(player.dirX) > Math.abs(player.dirY)) {
                    // 横に移動している時
                    ctx.fillRect(centerEyeX, centerEyeY - eyeSpacing / 2, eyeSize, eyeSize);
                    ctx.fillRect(centerEyeX, centerEyeY + eyeSpacing / 2, eyeSize, eyeSize);
                } else {
                    // 縦に移動している時、または斜め
                    ctx.fillRect(centerEyeX - eyeSpacing / 2, centerEyeY, eyeSize, eyeSize);
                    ctx.fillRect(centerEyeX + eyeSpacing / 2, centerEyeY, eyeSize, eyeSize);
                }

                let centerX = player.x + player.size/2;
                let centerY = player.y + player.size/2;

                // 磁力の範囲（スキル準備完了時に薄く表示）
                if (player.skillCooldown <= 0 && player.magnetActiveFrames === 0) {
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 150, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // 磁力エフェクト（発動時）
                if (player.magnetActiveFrames > 0) {
                    ctx.strokeStyle = 'rgba(0, 255, 255, ' + (Math.abs(Math.sin(Date.now() / 100)) * 0.5 + 0.2) + ')';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 150, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // 【追加】残り宝石が5個以下の時、一番近い宝石へのナビゲーション矢印を表示
                if (remainingGems > 0 && remainingGems <= 5) {
                    let playerCenterX = player.x + player.size / 2;
                    let playerCenterY = player.y + player.size / 2;
                    let nearestGem = null;
                    let minDist = 999999;
                    for (let gem of gems) {
                        if (!gem.collected) {
                            let dx = gem.x - playerCenterX;
                            let dy = gem.y - playerCenterY;
                            let dist = dx * dx + dy * dy;
                            if (dist < minDist) {
                                minDist = dist;
                                nearestGem = gem;
                            }
                        }
                    }
                    if (nearestGem) {
                        let angle = Math.atan2(nearestGem.y - playerCenterY, nearestGem.x - playerCenterX);
                        let arrowDist = 40; 
                        let arrowX = playerCenterX + Math.cos(angle) * arrowDist;
                        let arrowY = playerCenterY + Math.sin(angle) * arrowDist;
                        
                        ctx.save();
                        ctx.translate(arrowX, arrowY);
                        ctx.rotate(angle);
                        
                        // 矢印の描画（ピカピカ光る緑色）
                        let alpha = (Math.sin(Date.now() / 150) + 1) / 2 * 0.5 + 0.5;
                        ctx.fillStyle = `rgba(0, 255, 100, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(10, 0);
                        ctx.lineTo(-6, 8);
                        ctx.lineTo(-6, -8);
                        ctx.fill();
                        
                        ctx.restore();
                    }
                }

                ctx.restore(); 

                // 視界処理
                ctx.save();
                const playerScreenX = player.x + player.size / 2 - cameraX;
                const playerScreenY = player.y + player.size / 2 - cameraY;

                const visionRadius = 260; 
                const gradient = ctx.createRadialGradient(
                    playerScreenX, playerScreenY, 20, 
                    playerScreenX, playerScreenY, visionRadius 
                );
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)'); 
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.98)'); 

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();

                // 【追加】心音のような赤い明滅エフェクト（画面全体を覆う）
                if (panicIntensity > 0) {
                    ctx.save();
                    let pulse = (Math.sin(Date.now() / 150) + 1) / 2; // 0.0 ~ 1.0の拍動
                    ctx.fillStyle = `rgba(255, 0, 0, ${panicIntensity * pulse * 0.4})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                }

                // --- UIの描画 ---
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('スコア: ' + score, 20, 40);

                // 【追加】経過時間の表示（コンマ数秒まで表示）
                let elapsedMs = Date.now() - startTime;
                let em = String(Math.floor(elapsedMs / 60000)).padStart(2, '0');
                let es = String(Math.floor((elapsedMs % 60000) / 1000)).padStart(2, '0');
                let ems = String(elapsedMs % 1000).padStart(3, '0').slice(0, 2);
                ctx.textAlign = 'center';
                ctx.fillText('TIME ' + em + ':' + es + '.' + ems, canvas.width / 2, 40);
                
                // 【常時表示】スキルが何のスキルか
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'right';
                if (remainingGems === 0) {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillText('ゴールへ向かえ！', canvas.width - 20, 40);
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.fillText('残り: ' + remainingGems + '個', canvas.width - 20, 40);
                }
                
                // スキルUIの描画
                ctx.textAlign = 'left';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.fillText('スキル [Q]: 磁石 (周囲の宝石を引き寄せる)', 20, canvas.height - 35);
                
                // クールダウンゲージ
                ctx.fillStyle = '#444';
                ctx.fillRect(20, canvas.height - 25, 200, 16);
                
                if (player.magnetActiveFrames > 0) {
                    // 発動中のゲージ
                    let ratio = player.magnetActiveFrames / (60 * 15);
                    ctx.fillStyle = '#00ffff'; 
                    ctx.fillRect(20, canvas.height - 25, 200 * ratio, 16);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    let seconds = Math.ceil(player.magnetActiveFrames / 60);
                    ctx.fillText('ACTIVE: 残り' + seconds + '秒', 230, canvas.height - 12);
                } else if (player.skillCooldown > 0) {
                    let ratio = 1 - (player.skillCooldown / player.skillCooldownMax);
                    ctx.fillStyle = '#ffaa00'; // 充電中はオレンジ
                    ctx.fillRect(20, canvas.height - 25, 200 * ratio, 16);
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px sans-serif';
                    let cdSec = Math.ceil(player.skillCooldown / 60);
                    ctx.fillText(cdSec + 's', 230, canvas.height - 12);
                } else {
                    ctx.fillStyle = '#00ff00'; // 完了時は緑
                    ctx.fillRect(20, canvas.height - 25, 200, 16);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText('READY!', 230, canvas.height - 12);
                }

                ctx.restore();

            } else if (currentScene === 'RESULT') {
                ctx.fillStyle = (resultMessage === 'ゲームクリア！！') ? '#00ff00' : '#ff3333';
                ctx.font = '40px sans-serif';
                ctx.textAlign = 'center';
                
                if (resultMessage === 'ゲームクリア！！') {
                    ctx.fillText(resultMessage, canvas.width / 2, canvas.height / 2 - 140);
                    
                    // 今回のタイム（コンマ数秒対応）
                    let cm = String(Math.floor(clearTime / 60000)).padStart(2, '0');
                    let cs = String(Math.floor((clearTime % 60000) / 1000)).padStart(2, '0');
                    let cms = String(clearTime % 1000).padStart(3, '0').slice(0, 2);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 28px sans-serif';
                    ctx.fillText('クリアタイム: ' + cm + ':' + cs + '.' + cms, canvas.width / 2, canvas.height / 2 - 80);

                    // ランキング表示
                    ctx.fillStyle = '#00ffff';
                    ctx.font = '24px sans-serif';
                    ctx.fillText('--- トップ 5 ---', canvas.width / 2, canvas.height / 2 - 20);
                    
                    ctx.font = '20px sans-serif';
                    for (let i = 0; i < leaderboard.length; i++) {
                        let lm = String(Math.floor(leaderboard[i] / 60000)).padStart(2, '0');
                        let ls = String(Math.floor((leaderboard[i] % 60000) / 1000)).padStart(2, '0');
                        let lms = String(leaderboard[i] % 1000).padStart(3, '0').slice(0, 2);
                        let prefix = (i === 0) ? '🏆 1位' : (i + 1) + '位';
                        // 今回出した記録はオレンジ色でハイライト
                        ctx.fillStyle = (leaderboard[i] === clearTime) ? '#ffaa00' : '#fff';
                        ctx.fillText(prefix + ' - ' + lm + ':' + ls + '.' + lms, canvas.width / 2, canvas.height / 2 + 20 + i * 30);
                    }
                    
                    ctx.fillStyle = '#aaa';
                    ctx.font = '20px sans-serif';
                    ctx.fillText('Enterキーを押してタイトルへ', canvas.width / 2, canvas.height / 2 + 200);
                } else {
                    // ゲームオーバー時
                    ctx.fillText(resultMessage, canvas.width / 2, canvas.height / 2 - 20);
                    ctx.fillStyle = '#aaa';
                    ctx.font = '20px sans-serif';
                    ctx.fillText('Enterキーを押してタイトルへ', canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        const FPS = 60;
        const frameDuration = 1000 / FPS;
        let lastTime = performance.now();

        function gameLoop(timestamp) {
            // 初回実行時の対策
            if (!timestamp) timestamp = performance.now();
            
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // タブが非アクティブだった時などに巨大な値が入るのを防ぐ
            if (deltaTime > 250) deltaTime = 250;

            let timeScale = deltaTime / frameDuration;

            update(timeScale);
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
